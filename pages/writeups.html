<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writeups // 5t4t1cV01d</title>
  <link rel="icon" type="image/png" href="../assets/icon/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="../assets/js/components.js" defer></script>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder" data-active="/writeups"></div>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <h1><span class="accent">//</span> Writeups Vault</h1>
    <p>Machines solved on HackTheBox, TryHackMe, and DockerLabs. Each writeup documents the complete exploitation
      process.</p>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Platform:</span>
      <button class="filter-btn active" data-filter="platform" data-value="all">All</button>
      <button class="filter-btn" data-filter="platform" data-value="HTB">HackTheBox</button>
      <button class="filter-btn" data-filter="platform" data-value="THM">TryHackMe</button>
      <button class="filter-btn" data-filter="platform" data-value="DockerLabs">DockerLabs</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Difficulty:</span>
      <button class="filter-btn active" data-filter="diff" data-value="all">All</button>
      <button class="filter-btn" data-filter="diff" data-value="easy" style="color:var(--green)">Easy</button>
      <button class="filter-btn" data-filter="diff" data-value="medium" style="color:var(--orange)">Medium</button>
      <button class="filter-btn" data-filter="diff" data-value="hard" style="color:var(--red)">Hard</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">OS:</span>
      <button class="filter-btn active" data-filter="os" data-value="all">All</button>
      <button class="filter-btn" data-filter="os" data-value="linux"><i class="fa-brands fa-linux"></i> Linux</button>
      <button class="filter-btn" data-filter="os" data-value="windows"><i class="fa-brands fa-windows"></i>
        Windows</button>
    </div>
    <p class="writeup-count" id="writeupCount"></p>
  </div>

  <!-- CARDS -->
  <div class="section" style="padding-top:0; max-width:1100px; margin:0 auto; padding-left:2rem; padding-right:2rem;">
    <div class="writeups-grid" id="allWriteups">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="../assets/js/writeups-data.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
